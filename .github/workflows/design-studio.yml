name: Design Studio

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test-evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            examples/design-studio/package-lock.json
            evals/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run coverage:check
      - run: npm run build
      - run: npm run typecheck:tests
      - run: npm run test
