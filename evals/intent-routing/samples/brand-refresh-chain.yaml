fixtureFormatVersion: "0.1.0"
kind: intent-routing
id: sample.intent.brand-refresh-chain
title: Brand refresh routes to a known chain
description: Sample fixture for a finite ordered action chain with equivalent palette ordering.
authoredBy: issue-16-implementing-agent
authoredDate: "2026-07-08"
target:
  integrationId: design-studio
  registry:
    id: design-studio.sample-registry
    version: sample-v0
    ref: examples/design-studio
sample:
  isSample: true
  note: Uses design-studio-oriented sample IDs only; these IDs are not part of the fixture format.
requirementRefs:
  - SA-EXEC-020
  - SA-EXEC-026
  - SA-EXEC-027
given:
  surfaceId: editor
  utterance: "use teal and amber, switch to a landing page, then generate three directions"
  posturePreset: creative-tool
  facts:
    design.template.current: blank
    quotas.directionGenerations.remaining: 8
expected:
  routeClass: action chain
  negativeCase: none
  actions:
    - stepId: set_brand_palette
      actionId: palette.set_custom
      surfaceId: editor
      params:
        allowExtra: false
        fields:
          colors:
            kind: arrayUnordered
            values:
              - "#0F766E"
              - "#B45309"
    - stepId: apply_landing
      actionId: template.apply_landing
      surfaceId: editor
      params:
        allowExtra: false
        fields:
          templateId:
            kind: oneOf
            values:
              - landing
              - saas-launch
    - stepId: generate_directions
      actionId: lab.generate_directions
      surfaceId: editor
      params:
        allowExtra: false
        fields:
          count:
            kind: numericTolerance
            value: 3
            tolerance: 0
